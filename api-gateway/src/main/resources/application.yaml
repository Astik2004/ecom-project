server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cloud:
    cloud:
      gateway:
        discovery:
          locator:
            enabled: true
            lower-case-service-id: true
        default-filters:
          - name: RequestSize
            args:
              maxSize: 10MB
          - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers
        httpclient:
          connect-timeout: 3000
          response-timeout: 30s
          pool:
            type: elastic
            max-idle-time: 15s


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    urls:
      - name: user-service
        url: /user-service/v1/api-docs
#      - name: notification-service
#        url: /notification-service/v1/api-docs
#      - name: product-service
#        url: /product-service/v1/api-docs
  api-docs:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

application:
  security:
    jwt:
      secret-key: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A"

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.astik.api_gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.lettuce.core: WARN
  pattern: