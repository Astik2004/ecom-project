name: CD — Deploy on merge to master

on:
  push:
    branches: [ "master" ]
    paths:
      - "user-service/**"
      - "notification-service/**"
      - "product-service/**"
      - "cart-service/**"
      - "order-service/**"
      - "payment-service/**"

# Each job detects if ITS files changed.
# Only changed services rebuild and push — unchanged ones are skipped.
# This means merging a user-service PR never rebuilds payment-service.

jobs:

  # ── User Service ───────────────────────────────────────────────
  user-service:
    name: Deploy user-service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            service:
              - 'user-service/**'

      - uses: actions/setup-java@v4
        if: steps.changes.outputs.service == 'true'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        if: steps.changes.outputs.service == 'true'
        run: mvn clean package -DskipTests -Pdocker
        working-directory: user-service

      - name: SonarCloud
        if: steps.changes.outputs.service == 'true'
        run: >
          mvn sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.projectKey=Astik2004_ecom-project
          -Dsonar.organization=astik2004
          -Dsonar.host.url=https://sonarcloud.io
          -DskipTests
        working-directory: user-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        if: steps.changes.outputs.service == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        if: steps.changes.outputs.service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest
            ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

