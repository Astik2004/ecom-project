name: CI — Pull Request

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "user-service/**"
      - "notification-service/**"
      - "product-service/**"
      - "cart-service/**"
      - "order-service/**"
      - "payment-service/**"
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# ─── Reusable build logic ─────────────────────────────────────────
# Each job below is identical except for the service name.
# "if" condition makes each job run ONLY if that service's
# files were actually changed in this PR — so if you only
# touch user-service, the other 5 jobs are skipped automatically.

jobs:

  # ── User Service ───────────────────────────────────────────────
  user-service:
    name: user-service — Build, Test, Sonar
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'user-service') ||
      startsWith(github.event.pull_request.head.ref, 'feature/user') ||
      true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            service:
              - 'user-service/**'

      - name: Build and verify
        if: steps.changes.outputs.service == 'true'
        run: mvn clean verify -DskipTests -Pdocker
        working-directory: user-service

      - name: SonarCloud
        if: steps.changes.outputs.service == 'true'
        run: >
          mvn sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.projectKey=Astik2004_ecom-project
          -Dsonar.organization=astik2004
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.qualitygate.wait=true
          -DskipTests
        working-directory: user-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Docker build check
        if: steps.changes.outputs.service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: false
          tags: user-service:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Notification Service ───────────────────────────────────────
