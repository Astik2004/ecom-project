name: CI — Pull Request

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - "user-service/**"
      - "notification-service/**"
      - "product-service/**"
      - "cart-service/**"
      - "order-service/**"
      - "payment-service/**"
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  user-service:
    name: user-service — Build, Test, Sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            service:
              - 'user-service/**'
      - name: Build
        if: steps.changes.outputs.service == 'true'
        run: mvn clean verify -DskipTests -Pdocker
        working-directory: user-service
      - name: SonarCloud
        if: steps.changes.outputs.service == 'true'
        continue-on-error: true
        run: >
          mvn sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.projectKey=Astik2004_ecom-project
          -Dsonar.organization=astik2004
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.qualitygate.wait=true
          -DskipTests
        working-directory: user-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Docker build check
        if: steps.changes.outputs.service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: false
          tags: user-service:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

