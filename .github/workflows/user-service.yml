name: User Service CI + Docker + SonarCloud

on:
  push:
    branches: ["master"]
    paths:
      - "user-service/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Spring Boot JAR and SonarCloud Scan
        run: mvn clean package sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=Astik2004_ecom-project -DskipTests -Pdocker
        working-directory: user-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build --pull -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest .
        working-directory: user-service

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest