server:
  port: 8081
spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://postgres:5432/ecomdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

application:
  security:
    jwt:
      secret-key: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
      expiration: 900000
      refresh-token:
        expiration: 604800000
  account:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    email-token-expiry-hours: 24
    password-reset-token-expiry-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.astik.user_service: DEBUG
    org.springframework.security: INFO