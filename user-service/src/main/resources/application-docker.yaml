spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://postgres:5432/ecomdb?currentSchema=public&options=-c%20timezone=Asia/Kolkata
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

  threads:
    virtual:
      enabled: true

server:
  port: 8081

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A}
      expiration: 900000
      refresh-token:
        expiration: 604800000
  account:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    email-token-expiry-hours: 24
    password-reset-token-expiry-minutes: 15

app:
  kafka:
    topics:
      user-registered: user.registered

springdoc:
  swagger-ui:
    path: /api-docs.html
  api-docs:
    path: /api-spec
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.astik.user_service: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.flywaydb: INFO