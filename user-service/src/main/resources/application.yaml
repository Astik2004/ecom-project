springdoc:
  # Change the Swagger UI path (e.g., http://localhost:8080/api-docs.html)
  swagger-ui:
    path: /api-docs.html
  api-docs:
    path: /api-spec
  show-actuator: true
  writer-with-default-pretty-printer: true

spring:
  application:
    name: user-service
  profiles:
    active: local
  datasource:
    # Appended options to force the timezone directly to the PG driver
    url: jdbc:postgresql://localhost:5433/ecomdb?currentSchema=public&options=-c%20timezone=Asia/Kolkata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  redis:
    host: redis
    port: 6379

application:
  security:
    jwt:
      secret-key: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
      expiration: 900000
      refresh-token:
        expiration: 604800000
  account:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    email-token-expiry-hours: 24
    password-reset-token-expiry-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8081