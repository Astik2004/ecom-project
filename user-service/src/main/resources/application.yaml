spring:
  application:
    name: user-service
  profiles:
    active: local   # Local run ke liye
  datasource:
    url: jdbc:postgresql://localhost:5433/ecomdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

# Database local install ke liye

logging:
  level:
    com.astik.user_service: DEBUG
    org.springframework.security: INFO