<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { max-width: 600px; margin: 40px auto; background: #fff;
                     border-radius: 8px; padding: 32px; }
        .header { background: #DC2626; padding: 24px; border-radius: 8px 8px 0 0;
                  text-align: center; }
        .header h1 { color: #fff; margin: 0; }
        .body { padding: 24px 0; }
        .body p { color: #6b7280; line-height: 1.6; }
        .btn { display: inline-block; background: #DC2626; color: #fff;
               padding: 12px 28px; border-radius: 6px; text-decoration: none; }
        .warning { background: #FEF3C7; border-left: 4px solid #F59E0B;
                   padding: 12px 16px; border-radius: 4px; color: #92400E; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>Password Reset Request</h1></div>
    <div class="body">
        <p>We received a request to reset your password. Click below:</p>
        <a th:href="${resetLink}" class="btn">Reset My Password</a>
        <br/><br/>
        <div class="warning">
            This link expires in 15 minutes. If you did not request this,
            please ignore this email.
        </div>
        <p style="margin-top:16px; font-size:12px; color:#9ca3af;">
            Or copy this link:
            <span th:text="${resetLink}">link</span>
        </p>
    </div>
</div>
</body>
</html>
