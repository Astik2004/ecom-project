<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff;
                     border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #4F46E5; padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .body { padding: 32px; }
        .body h2 { color: #1f2937; }
        .body p { color: #6b7280; line-height: 1.6; }
        .badge { display: inline-block; background: #EEF2FF; color: #4F46E5;
                 padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .footer { background: #f9fafb; padding: 20px 32px;
                  text-align: center; color: #9ca3af; font-size: 12px; }
        .btn { display: inline-block; background: #4F46E5; color: #ffffff;
               padding: 12px 28px; border-radius: 6px; text-decoration: none;
               font-weight: bold; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Welcome to Ecommerce App!</h1>
    </div>
    <div class="body">
        <h2 th:text="'Hi ' + ${firstName} + '!'">Hi User!</h2>
        <p>Your account has been created successfully.</p>
        <p>
            <strong>Email:</strong>
            <span th:text="${email}">user@example.com</span>
        </p>
        <p>
            <strong>Account Type:</strong>
            <span class="badge" th:text="${role}">CUSTOMER</span>
        </p>
        <p>You can now log in and start shopping.</p>
        <a href="http://localhost:3000/login" class="btn">
            Go to App
        </a>
    </div>
    <div class="footer">
        <p>This is an automated email. Please do not reply.</p>
        <p>&copy; 2025 Ecommerce App. All rights reserved.</p>
    </div>
</div>
</body>
</html>
