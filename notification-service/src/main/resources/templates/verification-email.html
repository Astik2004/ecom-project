<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; }
        .wrapper { max-width: 600px; margin: 40px auto; }
        .header { background: #059669; padding: 32px; text-align: center; border-radius: 12px 12px 0 0; }
        .header h1 { color: #fff; margin: 0; }
        .body { background: #fff; padding: 32px; }
        .body p { color: #4a5568; line-height: 1.7; margin-bottom: 12px; }
        .btn { display: inline-block; background: #059669; color: #fff;
               padding: 14px 36px; border-radius: 8px; text-decoration: none;
               font-size: 16px; font-weight: bold; }
        .btn-container { text-align: center; margin: 28px 0; }
        .warning { background: #FEF3C7; border-left: 4px solid #F59E0B;
                   padding: 12px 16px; border-radius: 4px; color: #92400E;
                   font-size: 13px; margin-top: 16px; }
        .footer { background: #f7fafc; padding: 20px 32px; text-align: center;
                  border-radius: 0 0 12px 12px; color: #a0aec0; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header"><h1>Verify Your Email</h1></div>
    <div class="body">
        <p th:text="'Hi ' + ${firstName} + ','">Hi User,</p>
        <p>Please verify your email address by clicking the button below:</p>
        <div class="btn-container">
            <a th:href="${verificationLink}" class="btn">Verify Email</a>
        </div>
        <div class="warning">
            This link expires in 24 hours. If you did not create an account,
            please ignore this email.
        </div>
        <p style="font-size:12px; color:#a0aec0; margin-top:16px;">
            Or copy this link: <span th:text="${verificationLink}"></span>
        </p>
    </div>
    <div class="footer">
        <p>&copy; 2025 Ecommerce App. All rights reserved.</p>
    </div>
</div>
</body>
</html>
